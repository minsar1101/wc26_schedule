<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 — Календарь падений</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #161a22;
  --surface2: #1e2330;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --muted: #6b7280;
  --accent: #f97316;
  --accent2: #3b82f6;
  --gs1: #1e3a5f; --gs1t: #60a5fa;
  --gs2: #1e3a5f; --gs2t: #93c5fd;
  --gs3: #1e3a5f; --gs3t: #bfdbfe;
  --r32: #2d1f5e; --r32t: #a78bfa;
  --r16: #0f3a2a; --r16t: #34d399;
  --qf: #3a2a0a; --qft: #fbbf24;
  --sf: #3a1a0a; --sft: #fb923c;
  --final: #e24b4a; --finalt: #fff;
  --cell-w: 52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  min-height: 100vh;
}

/* ── Header ── */
header {
  padding: 28px 32px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.5px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-badge {
  background: var(--accent);
  color: #000;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  letter-spacing: 1px;
}
.header-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

/* ── Controls bar ── */
.controls {
  padding: 14px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
.ctrl-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.ctrl-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
select, button {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 5px 10px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
}
select:hover, button:hover { border-color: rgba(255,255,255,0.3); }
select:focus { border-color: var(--accent); }

/* ── Stats strip ── */
.stats {
  padding: 14px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 0;
}
.stat {
  flex: 1;
  padding: 8px 20px;
  border-right: 1px solid var(--border);
  min-width: 100px;
}
.stat:first-child { padding-left: 0; }
.stat:last-child { border-right: none; }
.stat-n {
  font-size: 26px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  color: var(--text);
  line-height: 1;
}
.stat-l {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── Tabs ── */
.tabs {
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 0;
}
.tab {
  padding: 12px 18px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  background: none;
  border-radius: 0;
  border-left: none;
  border-top: none;
  border-right: none;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Content areas ── */
.pane { display: none; }
.pane.active { display: block; }

/* ── Calendar ── */
.cal-wrap {
  padding: 20px 32px;
  overflow-x: auto;
}
table.cal {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
}
table.cal th {
  font-size: 10px;
  color: var(--muted);
  padding: 4px 2px;
  text-align: center;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
  font-weight: 400;
}
th.hcol {
  position: sticky;
  left: 0;
  z-index: 20;
  min-width: 52px;
  background: var(--bg);
}
td.hlbl {
  position: sticky;
  left: 0;
  background: var(--bg);
  font-size: 11px;
  color: var(--muted);
  padding: 0 8px 0 0;
  text-align: right;
  border-right: 1px solid var(--border);
  z-index: 5;
  white-space: nowrap;
}
td.cell {
  width: var(--cell-w);
  min-width: var(--cell-w);
  height: 38px;
  border: 0.5px solid var(--border);
  padding: 2px 2px 2px 3px;
  vertical-align: top;
  transition: background 0.1s;
}
td.cell:hover { background: var(--surface2); cursor: pointer; }
td.cell.empty { cursor: default; }
td.cell.weekend { background: rgba(255,255,255,0.015); }
.chip {
  border-radius: 3px;
  padding: 1px 4px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  display: block;
  margin-bottom: 1px;
  line-height: 1.4;
}
.chip-gs { background: var(--gs1); color: var(--gs1t); }
.chip-r32 { background: var(--r32); color: var(--r32t); }
.chip-r16 { background: var(--r16); color: var(--r16t); }
.chip-qf { background: var(--qf); color: var(--qft); }
.chip-sf { background: var(--sf); color: var(--sft); }
.chip-final { background: var(--final); color: var(--finalt); }

/* heat map cells */
td.heat-1 { background: rgba(249,115,22,0.12); }
td.heat-2 { background: rgba(249,115,22,0.28); }
td.heat-3 { background: rgba(249,115,22,0.46); }
td.heat-4 { background: rgba(249,115,22,0.65); }

.month-label {
  font-size: 9px;
  color: rgba(255,255,255,0.25);
  display: block;
  text-align: center;
  margin-bottom: 1px;
  letter-spacing: 0.5px;
}
.day-label { display: block; text-align: center; }
th.month-sep { border-left: 1px solid rgba(255,255,255,0.2) !important; }

/* ── Pivot ── */
.pivot-wrap {
  padding: 20px 32px;
  overflow-x: auto;
}
.pivot-section { margin-bottom: 32px; }
.pivot-title {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
table.pivot {
  border-collapse: collapse;
  width: 100%;
}
table.pivot th, table.pivot td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: center;
  font-size: 12px;
}
table.pivot th {
  background: var(--surface);
  color: var(--muted);
  font-weight: 500;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
table.pivot th.row-head { text-align: left; }
table.pivot td { color: var(--text); }
table.pivot td.row-head {
  text-align: left;
  color: var(--muted);
  font-size: 11px;
  background: var(--surface);
  white-space: nowrap;
}
table.pivot td.zero { color: rgba(255,255,255,0.12); }
table.pivot td.total-row, table.pivot th.total-row {
  background: var(--surface2);
  color: var(--accent);
  font-weight: 700;
  border-top: 1px solid rgba(249,115,22,0.3);
}
table.pivot td.total-col {
  background: var(--surface2);
  color: var(--accent2);
  font-weight: 700;
  border-left: 1px solid rgba(59,130,246,0.3);
}
table.pivot td.hot { color: var(--accent); font-weight: 700; }

/* ── Legend ── */
.legend {
  padding: 12px 32px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--muted);
}
.leg-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}

/* ── Tooltip ── */
#tooltip {
  position: fixed;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 11px;
  pointer-events: none;
  z-index: 999;
  max-width: 280px;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
#tt-round { font-size: 10px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
#tt-matches { color: var(--text); line-height: 1.6; }
#tt-time { font-size: 10px; color: var(--accent); margin-top: 5px; }

/* ── Bar charts in pivot ── */
.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 80px;
  padding: 8px 0 4px;
}
.bar-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  flex: 1;
  min-width: 0;
}
.bar-fill {
  width: 100%;
  background: var(--accent2);
  border-radius: 3px 3px 0 0;
  min-height: 2px;
  transition: opacity 0.15s;
}
.bar-fill:hover { opacity: 0.7; }
.bar-lbl { font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-align: center; }
.bar-val { font-size: 9px; color: var(--text); font-weight: 700; }
</style>
</head>

 Finals"},{"date":"2026-07-10","hour":22,"label":"QF — TBA","round":"Quarter Finals"},{"date":"2026-07-12","hour":0,"label":"QF — TBA","round":"Quarter Finals"},{"date":"2026-07-12","hour":4,"label":"QF — TBA","round":"Quarter Finals"},{"date":"2026-07-14","hour":22,"label":"SF — TBA","round":"Semi Finals"},{"date":"2026-07-15","hour":22,"label":"SF — TBA","round":"Semi Finals"},{"date":"2026-07-19","hour":0,"label":"3rd place match","round":"Finals"},{"date":"2026-07-19","hour":22,"label":"⚽ FINAL","round":"Finals"}];

const ALL_HOURS = [0,1,2,3,4,5,6,7,19,20,21,22,23];
const HOUR_LABELS = {0:'00:00',1:'01:00',2:'02:00',3:'03:00',4:'04:00',5:'05:00',6:'06:00',7:'07:00',19:'19:00',20:'20:00',21:'21:00',22:'22:00',23:'23:00'};

function getAllDates() {
  const dates = [];
  const s = new Date('2026-06-11'), e = new Date('2026-07-19');
  let d = new Date(s);
  while (d <= e) { dates.push(d.toISOString().slice(0,10)); d = new Date(d); d.setDate(d.getDate()+1); }
  return dates;
}

function chipClass(r) {
  if(r==='Finals') return 'chip-final';
  if(r==='Semi Finals') return 'chip-sf';
  if(r==='Quarter Finals') return 'chip-qf';
  if(r==='Round of 16') return 'chip-r16';
  if(r==='Round of 32') return 'chip-r32';
  return 'chip-gs';
}
function roundShort(r) {
  return {1:'R1',2:'R2',3:'R3','Round of 32':'R32','Round of 16':'R16','Quarter Finals':'QF','Semi Finals':'SF','Finals':'FIN'}[r]||r;
}
function roundLong(r) {
  return {1:'Group Stage R1',2:'Group Stage R2',3:'Group Stage R3','Round of 32':'Round of 32','Round of 16':'Round of 16','Quarter Finals':'Quarter Finals','Semi Finals':'Semi Finals','Finals':'Finals'}[r]||r;
}

function filterMatches(f) {
  return MATCHES.filter(m => {
    if(f==='gs') return ['1','2','3'].includes(m.round);
    if(f==='ko') return !['1','2','3'].includes(m.round);
    if(f==='peak') return m.hour>=19;
    return true;
  });
}

let currentFilter = 'all', currentHL = 'round';
const FDESC = {all:'All matches',gs:'Group stage only',ko:'Knockout only',peak:'Peak hours (19–23 MSK)'};

function buildCalendar(matches, hl) {
  const dates = getAllDates();
  const byCell = {};
  matches.forEach(m => { const k=m.date+'|'+m.hour; if(!byCell[k]) byCell[k]=[]; byCell[k].push(m); });
  const perDay = {};
  matches.forEach(m => { perDay[m.date]=(perDay[m.date]||0)+1; });
  const globalMax = Math.max(...Object.values(perDay), 1);

  const DAY = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const MONTHS = ['JUN','JUL'];
  let prevMo = -1;

  let html = '<table class="cal"><thead><tr><th class="hcol"></th>';
  dates.forEach((d, i) => {
    const dt = new Date(d);
    const mo = dt.getMonth();
    const isSep = mo !== prevMo && i > 0;
    const isWe = [0,6].includes(dt.getDay());
    html += `<th${isSep?' class="month-sep"':''} style="min-width:52px;${isWe?'opacity:0.6':''}">`;
    if(mo !== prevMo) html += `<span class="month-label">${MONTHS[mo-5]}</span>`;
    html += `<span class="day-label">${DAY[dt.getDay()]} ${dt.getDate()}</span></th>`;
    prevMo = mo;
  });
  html += '</tr></thead><tbody>';

  ALL_HOURS.forEach(h => {
    html += `<tr><td class="hlbl">${HOUR_LABELS[h]}</td>`;
    dates.forEach(d => {
      const k = d+'|'+h;
      const ms = byCell[k]||[];
      const cnt = ms.length;
      const isWe = [0,6].includes(new Date(d).getDay());
      let cls = 'cell';
      if(isWe) cls += ' weekend';
      if(cnt===0) cls += ' empty';
      let style = '';
      if(hl==='heat' && cnt>0) cls += ' heat-'+Math.min(cnt,4);
      html += `<td class="${cls}" data-k="${k}" data-d="${d}" data-h="${h}">`;
      if(hl==='round') ms.forEach(m => { html += `<span class="chip ${chipClass(m.round)}">${roundShort(m.round)}</span>`; });
      else if(cnt>0) html += `<span style="font-size:11px;font-weight:700;color:var(--accent);padding:2px 4px;display:block;">${cnt}</span>`;
      html += '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('cal-wrap').innerHTML = html;

  // tooltip
  const tt = document.getElementById('tooltip');
  document.querySelectorAll('td.cell:not(.empty)').forEach(td => {
    td.addEventListener('mouseenter', e => {
      const ms = byCell[td.dataset.k]||[];
      if(!ms.length) return;
      document.getElementById('tt-round').textContent = roundLong(ms[0].round) + (ms.length>1?' · '+ms.length+' matches':'');
      document.getElementById('tt-matches').innerHTML = ms.map(m=>m.label).join('<br>');
      document.getElementById('tt-time').textContent = td.dataset.d + ' · ' + HOUR_LABELS[parseInt(td.dataset.h)] + ' MSK';
      tt.style.display = 'block';
    });
    td.addEventListener('mouseleave', () => { tt.style.display='none'; });
    td.addEventListener('mousemove', e => { tt.style.left=(e.clientX+14)+'px'; tt.style.top=(Math.max(e.clientY-60,8))+'px'; });
  });
}

function buildPivot(matches) {
  // ── Pivot 1: hours × rounds ──
  const ROUND_ORDER = ['1','2','3','Round of 32','Round of 16','Quarter Finals','Semi Finals','Finals'];
  const ROUND_SHORT = {'1':'GS R1','2':'GS R2','3':'GS R3','Round of 32':'R32','Round of 16':'R16','Quarter Finals':'QF','Semi Finals':'SF','Finals':'FIN'};
  const hourRound = {};
  const hourTotals = {}, roundTotals = {};
  let grand = 0;
  const activeRounds = [...new Set(matches.map(m=>m.round))];
  const orderedRounds = ROUND_ORDER.filter(r=>activeRounds.includes(r));

  ALL_HOURS.forEach(h => {
    hourRound[h] = {};
    orderedRounds.forEach(r => hourRound[h][r]=0);
  });
  matches.forEach(m => {
    hourRound[m.hour][m.round] = (hourRound[m.hour][m.round]||0)+1;
    hourTotals[m.hour] = (hourTotals[m.hour]||0)+1;
    roundTotals[m.round] = (roundTotals[m.round]||0)+1;
    grand++;
  });
  const activeHours = ALL_HOURS.filter(h => hourTotals[h]>0);

  let html = '<div class="pivot-section">';
  html += '<div class="pivot-title">Matches by MSK hour × round</div>';
  html += '<table class="pivot"><thead><tr><th class="row-head">Hour MSK</th>';
  orderedRounds.forEach(r => html += `<th>${ROUND_SHORT[r]}</th>`);
  html += '<th class="total-col">Total</th></tr></thead><tbody>';

  activeHours.forEach(h => {
    const rowTotal = hourTotals[h]||0;
    html += `<tr><td class="row-head">${HOUR_LABELS[h]}</td>`;
    orderedRounds.forEach(r => {
      const v = hourRound[h][r]||0;
      html += `<td class="${v===0?'zero':v>=3?'hot':''}">${v===0?'—':v}</td>`;
    });
    html += `<td class="total-col">${rowTotal}</td></tr>`;
  });

  // totals row
  html += '<tr><td class="row-head total-row">Total</td>';
  orderedRounds.forEach(r => html += `<td class="total-row">${roundTotals[r]||0}</td>`);
  html += `<td class="total-row total-col">${grand}</td></tr>`;
  html += '</tbody></table></div>';

  // ── Pivot 2: by date (grouped by week) ──
  const dates = getAllDates();
  const byDate = {};
  matches.forEach(m => { byDate[m.date]=(byDate[m.date]||0)+1; });
  const activeDates = dates.filter(d => byDate[d]>0);
  const maxPerDate = Math.max(...activeDates.map(d=>byDate[d]||0), 1);

  html += '<div class="pivot-section">';
  html += '<div class="pivot-title">Matches per day</div>';
  html += '<table class="pivot"><thead><tr><th class="row-head">Date</th><th>Day</th><th>Matches</th><th>Load bar</th><th class="total-col">Round(s)</th></tr></thead><tbody>';

  const DAY_FULL = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  activeDates.forEach(d => {
    const dt = new Date(d);
    const cnt = byDate[d]||0;
    const pct = Math.round(cnt/maxPerDate*100);
    const dayMatches = matches.filter(m=>m.date===d);
    const rounds = [...new Set(dayMatches.map(m=>ROUND_SHORT[m.round]||m.round))].join(', ');
    const isWe = [0,6].includes(dt.getDay());
    html += `<tr style="${isWe?'opacity:0.7':''}">`;
    html += `<td class="row-head">${d}</td>`;
    html += `<td>${DAY_FULL[dt.getDay()]}</td>`;
    html += `<td class="${cnt>=4?'hot':''}">${cnt}</td>`;
    html += `<td><div style="background:var(--accent2);height:8px;border-radius:2px;width:${pct}%;min-width:3px;"></div></td>`;
    html += `<td class="total-col" style="text-align:left;font-size:10px;">${rounds}</td></tr>`;
  });

  // total
  const totalDayMatches = activeDates.reduce((s,d)=>s+(byDate[d]||0),0);
  html += `<tr><td class="row-head total-row">Total</td><td class="total-row">${activeDates.length} days</td><td class="total-row total-col">${totalDayMatches}</td><td class="total-row"></td><td class="total-row"></td></tr>`;
  html += '</tbody></table></div>';

  // ── Pivot 3: hour totals bar chart ──
  html += '<div class="pivot-section"><div class="pivot-title">Matches by MSK hour (all days)</div>';
  html += '<div class="bar-chart">';
  const maxH = Math.max(...activeHours.map(h=>hourTotals[h]||0),1);
  activeHours.forEach(h => {
    const v = hourTotals[h]||0;
    const pct = Math.round(v/maxH*100);
    html += `<div class="bar-item">
      <div class="bar-val">${v}</div>
      <div class="bar-fill" style="height:${pct}%;background:${v===maxH?'var(--accent)':'var(--accent2)'};" title="${HOUR_LABELS[h]}: ${v} matches"></div>
      <div class="bar-lbl">${h}h</div>
    </div>`;
  });
  html += '</div></div>';

  document.getElementById('pivot-wrap').innerHTML = html;
}

function updateStats(matches) {
  const perDay = {}, perHour = {};
  matches.forEach(m => {
    perDay[m.date] = (perDay[m.date]||0)+1;
    perHour[m.hour] = (perHour[m.hour]||0)+1;
  });
  const slots = Object.values(matches.reduce((a,m)=>{a[m.date+'|'+m.hour]=1;return a},{})).length;
  document.getElementById('s-total').textContent = matches.length;
  document.getElementById('s-slots').textContent = slots;
  document.getElementById('s-maxday').textContent = Math.max(...Object.values(perDay),0);
  document.getElementById('s-maxhour').textContent = Math.max(...Object.values(perHour),0);
  document.getElementById('s-days').textContent = Object.keys(perDay).length;
}

function render() {
  const matches = filterMatches(currentFilter);
  document.getElementById('filter-desc').textContent = FDESC[currentFilter];
  updateStats(matches);
  buildCalendar(matches, currentHL);
  buildPivot(matches);
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(el=>el.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${t}')"]`).classList.add('active');
  document.getElementById('pane-'+t).classList.add('active');
}

document.getElementById('filter').addEventListener('change', e => { currentFilter=e.target.value; render(); });
document.getElementById('highlight').addEventListener('change', e => { currentHL=e.target.value; buildCalendar(filterMatches(currentFilter), currentHL); });

render();
</script>
